# Telegram chat tools config.
#
# If autodetection fails, set this manually.
# macOS example:   telegram_download_folder: "/Users/you/Downloads/Telegram"
# Windows example: telegram_download_folder: "C:/Users/you/Downloads/Telegram"
# Linux example:   telegram_download_folder: "/home/you/Downloads/Telegram"

telegram_download_folder: null

# Extra roots to scan for ChatExport_* folders.
telegram_download_folders: []

# Include common default locations such as ~/Downloads/Telegram and
# ~/Downloads/Telegram Desktop.
include_autodetected_roots: true

# The compiler copies exports into temp by default. Use "move" only if you want
# exports moved into this project before conversion.
transfer_mode: copy

temp_dir: "./temp"
output_dir: "./data/compiled"
raw_dir: "./data/raw"
recursive_search: true
max_search_depth: 4
delete_temp_before_run: false

# Telegram API exporter config (python_scripts/export_folder_chats_api.py)
# 1) Create app credentials at https://my.telegram.org
# 2) Put values into .env and keep keys below as-is, e.g.:
#    TELEGRAM_API_ID=123456
#    TELEGRAM_API_HASH=your_api_hash
#    TELEGRAM_PHONE_NUMBER=+15551234567
telegram_api_id: "${TELEGRAM_API_ID}"
telegram_api_hash: "${TELEGRAM_API_HASH}"
telegram_phone_number: "${TELEGRAM_PHONE_NUMBER}"
telegram_folder_title: IntellDetect # [use your Telegram folder title here]
telegram_session_dir: "./data/.telegram_session"
